<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Results — AI Adopter</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js for radar chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
  <div class="header-brand">
    <span class="icon">◈</span>
    <span>AI Adopter</span>
  </div>
  <nav id="main-nav"></nav>
  <div class="header-actions no-print">
    <button class="btn btn-secondary btn-sm" onclick="window.print()">⬇ Save PDF</button>
  </div>
</header>
<nav class="mobile-nav" id="mobile-nav"></nav>

<main class="narrow">

  <!-- Results Hero -->
  <div class="results-hero" id="results-hero">
    <!-- Rendered by results.js -->
    <div style="text-align:center;padding:60px 0">
      <div style="animation:spin 0.8s linear infinite;display:inline-block;font-size:28px">◎</div>
      <p style="color:var(--muted2);margin-top:12px">Loading your results…</p>
    </div>
  </div>

  <!-- Main results layout: radar + dimension bars -->
  <div id="results-area">
    <div class="results-layout">
      <!-- Left: Radar chart -->
      <div class="radar-container">
        <canvas id="radar-chart" width="380" height="380"></canvas>
      </div>

      <!-- Right: Dimension bars + gap analysis -->
      <div>
        <div style="margin-bottom:20px">
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:14px">Dimension Scores</div>
          <div id="dim-bars" class="dim-row">
            <!-- Rendered by results.js; static skeletons shown while loading -->
            <div class="dim-item"><div class="dim-label"><span class="skeleton" style="width:140px;height:13px;display:inline-block"></span><span class="skeleton" style="width:40px;height:13px;display:inline-block"></span></div><div class="progress-track"><div class="skeleton" style="height:6px;width:100%"></div></div></div>
            <div class="dim-item"><div class="dim-label"><span class="skeleton" style="width:160px;height:13px;display:inline-block"></span><span class="skeleton" style="width:40px;height:13px;display:inline-block"></span></div><div class="progress-track"><div class="skeleton" style="height:6px;width:100%"></div></div></div>
            <div class="dim-item"><div class="dim-label"><span class="skeleton" style="width:130px;height:13px;display:inline-block"></span><span class="skeleton" style="width:40px;height:13px;display:inline-block"></span></div><div class="progress-track"><div class="skeleton" style="height:6px;width:100%"></div></div></div>
            <div class="dim-item"><div class="dim-label"><span class="skeleton" style="width:150px;height:13px;display:inline-block"></span><span class="skeleton" style="width:40px;height:13px;display:inline-block"></span></div><div class="progress-track"><div class="skeleton" style="height:6px;width:100%"></div></div></div>
            <div class="dim-item"><div class="dim-label"><span class="skeleton" style="width:145px;height:13px;display:inline-block"></span><span class="skeleton" style="width:40px;height:13px;display:inline-block"></span></div><div class="progress-track"><div class="skeleton" style="height:6px;width:100%"></div></div></div>
          </div>
        </div>

        <div id="gap-analysis">
          <!-- Rendered by results.js -->
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div id="results-cta"></div>
  </div>

</main>

<footer>
  <div>Results are stored locally in your browser only.</div>
  <div><a href="assessment.html">← Retake Assessment</a> · <a href="playbook.html">View Playbook →</a></div>
</footer>

<script src="nav.js"></script>
<script src="results.js"></script>
</body>
</html>
